name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  CARGO_TERM_COLOR: always

jobs:
  architecture:
    name: architecture fitness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y ripgrep
      - run: bash tests/architecture_check.sh
      - run: bash tests/architecture_path_inventory.sh
      - name: Reject architecture drift
        env:
          ARCH_BASE_REF: origin/${{ github.base_ref || 'dev' }}
        run: bash scripts/architecture-check.sh

  msrv:
    name: Rust 1.88 MSRV
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.88.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: msrv-1.88
      - run: sudo apt-get update && sudo apt-get install -y libxcb1-dev
      - run: cargo +1.88.0 check --workspace --all-targets

  check:
    name: cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo +stable check --workspace --all-targets

  test:
    name: cargo test
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CARGO_BUILD_JOBS: 1
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y libxcb1-dev ripgrep
      - run: cargo +stable test --workspace
      # Snapshot assertions run through ordinary tests; no cargo-insta CLI is required.
      - name: JSON-RPC contract snapshots
        run: cargo +stable test -p interact --test json_rpc_snapshots

  pi-contract:
    name: pinned Pi RPC contract
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ALETHEON_REAL_PI: pi
      ALETHEON_REAL_PI_VERSION: 0.80.7
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install reviewed Pi release without lifecycle scripts
        run: npm install --global --ignore-scripts @earendil-works/pi-coding-agent@${ALETHEON_REAL_PI_VERSION}
      - name: Verify real Pi RPC framing and state response
        run: cargo +stable test -p executive --test pi_real_contract -- --ignored --exact pinned_pi_rpc_get_state_obeys_reviewed_jsonl_contract

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo +stable clippy --workspace -- -D warnings

  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo +stable fmt --all -- --check

  fuzz-quick-check:
    name: fuzz quick-check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/executive/fuzz -> target
      - name: Install cargo-fuzz
        run: cargo +nightly install cargo-fuzz --locked
      - name: Run all executive fuzz targets
        shell: bash
        run: |
          targets=(
            envelope_v2_parse
            envelope_v2_roundtrip
            jsonrpc_message_parse
            jsonrpc_method_dispatch
            toml_config_parse
            tool_input_json
            message_roundtrip
          )
          for target in "${targets[@]}"; do
            cargo +nightly fuzz run "$target" \
              --fuzz-dir crates/executive/fuzz -- -max_total_time=30
          done

  doc:
    name: cargo doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo +stable doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

  build:
    name: cargo build (release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y libxcb1-dev
      - run: cargo +stable build --workspace --release
