name: Real Coding Evaluation

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  evaluate:
    name: Leju DeepSeek coding fixtures
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ALETHEON_PROVIDER: leju
      ALETHEON_MODEL: deepseek/deepseek-v4-pro
      LEJU_API_KEY: ${{ secrets.LEJU_API_KEY }}
      CARGO_BUILD_JOBS: "1"
      CARGO_TARGET_DIR: ${{ github.workspace }}/target
      ALETHEON_BIN: ${{ github.workspace }}/target/debug/aletheon
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install runtime dependencies
        run: sudo apt-get update && sudo apt-get install -y libxcb1-dev ripgrep bubblewrap
      - name: Build the real CLI
        run: bash scripts/cargo-agent.sh build -p aletheon
      - name: Run real coding fixtures
        shell: bash
        run: |
          set -uo pipefail
          if [[ -z "${LEJU_API_KEY:-}" ]]; then
            echo "LEJU_API_KEY repository secret is required" >&2
            exit 2
          fi

          eval_root="$RUNNER_TEMP/aletheon-coding-e2e"
          config="$eval_root/core.toml"
          artifacts="$RUNNER_TEMP/coding-artifacts"
          core_log="$artifacts/core.log"
          export ALETHEON_CORE_SOCKET="$RUNNER_TEMP/aletheon/core.sock"
          export RUSTUP_HOME="${RUSTUP_HOME:-$HOME/.rustup}"
          export CARGO_HOME="${CARGO_HOME:-$HOME/.cargo}"
          export HOME="$eval_root/home"
          export XDG_CONFIG_HOME="$eval_root/config"
          export XDG_RUNTIME_DIR="$eval_root/run"
          mkdir -p "$HOME" "$XDG_CONFIG_HOME" "$XDG_RUNTIME_DIR" "$artifacts" \
            "$(dirname "$ALETHEON_CORE_SOCKET")"

          core_pid=""
          cleanup() {
            if [[ -n "$core_pid" ]] && kill -0 "$core_pid" 2>/dev/null; then
              kill "$core_pid" 2>/dev/null || true
              wait "$core_pid" 2>/dev/null || true
            fi
            rm -f "$config"
          }
          trap cleanup EXIT

          CONFIG_PATH="$config" python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path(os.environ["CONFIG_PATH"])
          content = f'''[agent]
          default_provider = {json.dumps(os.environ["ALETHEON_PROVIDER"])}
          default_model = {json.dumps(os.environ["ALETHEON_MODEL"])}

          [[providers]]
          name = {json.dumps(os.environ["ALETHEON_PROVIDER"])}
          base_url = "https://aiapi.lejurobot.com"
          api_key = {json.dumps(os.environ["LEJU_API_KEY"])}
          transport = "openai"
          models = [{json.dumps(os.environ["ALETHEON_MODEL"])}]
          '''
          descriptor = os.open(path, os.O_WRONLY | os.O_CREAT | os.O_EXCL, 0o600)
          with os.fdopen(descriptor, "w") as output:
              output.write(content)
          PY

          "$ALETHEON_BIN" core --config "$config" --socket "$ALETHEON_CORE_SOCKET" \
            >"$core_log" 2>&1 &
          core_pid=$!
          ready=false
          for _ in $(seq 1 60); do
            if [[ -S "$ALETHEON_CORE_SOCKET" ]]; then
              ready=true
              break
            fi
            if ! kill -0 "$core_pid" 2>/dev/null; then
              echo "infrastructure failure: inference core exited before readiness" >&2
              exit 2
            fi
            sleep 1
          done
          if [[ "$ready" != true ]]; then
            echo "infrastructure failure: inference core readiness timeout" >&2
            exit 2
          fi

          infrastructure_failed=0
          verification_failed=0
          for task in rust_bugfix rust_multifile rust_diagnosis; do
            receipt="$artifacts/$task.json"
            python3 tests/coding/harness/run.py "tests/coding/tasks/$task.toml" \
              --receipt "$receipt" || true
            if [[ ! -s "$receipt" ]]; then
              echo "infrastructure failure: $task produced no receipt" >&2
              infrastructure_failed=1
              continue
            fi
            classification=$(python3 - "$receipt" <<'PY'
          import json
          import sys

          receipt = json.load(open(sys.argv[1], encoding="utf-8"))
          if not receipt.get("operation_id"):
              print("infrastructure")
          elif not receipt.get("verification", {}).get("passed"):
              print("verification")
          else:
              print("passed")
          PY
            )
            case "$classification" in
              infrastructure) infrastructure_failed=1 ;;
              verification) verification_failed=1 ;;
            esac
            printf '%s: %s\n' "$task" "$classification" | tee -a "$GITHUB_STEP_SUMMARY"
          done

          if (( infrastructure_failed )); then
            echo "One or more fixtures had an infrastructure failure" >&2
            exit 2
          fi
          if (( verification_failed )); then
            echo "One or more fixtures failed agent verification" >&2
            exit 1
          fi
      - name: Upload coding receipts and core log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coding-e2e-${{ github.run_id }}
          path: ${{ runner.temp }}/coding-artifacts
          if-no-files-found: warn
          retention-days: 14
