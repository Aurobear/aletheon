[package]
name = "self-evolution-loop-example"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish = false

[dependencies]
fabric = { path = "../../crates/fabric" }
aletheon-kernel = { path = "../../crates/kernel" }
cognit = { path = "../../crates/cognit" }
corpus = { path = "../../crates/corpus" }
dasein = { path = "../../crates/dasein" }
mnemosyne = { path = "../../crates/mnemosyne" }
metacog = { path = "../../crates/metacog" }
executive = { path = "../../crates/executive" }
tokio = { version = "1", features = ["full"] }
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
