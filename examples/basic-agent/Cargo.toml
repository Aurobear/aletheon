[package]
name = "basic-agent-example"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
runtime = { path = "../../crates/runtime" }
base = { path = "../../crates/base" }
tokio = { version = "1", features = ["full"] }
anyhow = "1"
serde_json = "1"
uuid = { version = "1", features = ["v4"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
