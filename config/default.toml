[agent]
model = "claude-sonnet-4-20250514"
api_url = "https://api.anthropic.com"
max_iterations = 50
system_prompt = "You are a helpful system assistant. You can execute commands and manage files."

[agent.tools]
enabled = ["bash_exec", "file_read", "file_write", "system_status", "process_list"]

[daemon]
socket_path = "/run/agentd/agentd.sock"
log_level = "info"
