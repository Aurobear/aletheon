[agent]
# Compiled defaults — override in /etc/aletheon, ~/.aletheon, or project config.
# default_provider and default_model match the first configured provider below.
default_provider = "leju"
default_model = "deepseek/deepseek-v4-pro"
# 0 = no iteration cap (termination via LLM stop, circuit breaker, tool budget)
max_iterations = 0

[agent.admission]
max_agents_per_root = 64
max_running_agents = 16
max_depth = 4
max_queued_per_root = 32
sibling_fairness_quantum = 1
root_max_tokens = 2000000
max_child_tokens = 200000
max_storage_bytes = 4294967296
max_storage_items = 128

# At least one provider is required for the daemon to start.
# Fill in api_key (or set it via your local override config), then run the daemon.
[[providers]]
name = "leju"
base_url = "https://aiapi.lejurobot.com"
api_key = ""
transport = "anthropic"
models = ["deepseek/deepseek-v4-pro"]

[sandbox]
preference = "auto"
# bubblewrap_path = "/usr/bin/bwrap"

[plugins]
directories = []

[memory]
backend = "sqlite"
data_dir = "~/.aletheon/memory"

# Optional supplemental memory. Authentication and transport are configured in
# the matching [[mcp_servers]] entry; no credential is stored here.
[memory.gbrain]
enabled = false
server_name = "gbrain"
read_sources = ["aletheon", "general"]
write_source = "aletheon"
request_timeout_ms = 1200
delivery_batch_size = 20
recall_limit = 4
max_content_bytes = 6000
projection_enabled = false
spool_path = "~/.aletheon/memory/gbrain-spool.db"
spool_max_items = 10000
spool_max_bytes = 268435456
retry_initial_ms = 1000
retry_max_ms = 60000
retry_max_attempts = 12
retry_max_age_secs = 86400
schema_fixture = "config/gbrain/tools-schema.json"
schema_version = "v0.42.59.0"
legacy_outbox_dir = "~/.aletheon/gbrain-outbox"
# Register the transport only in a local secret-bearing override. See
# deploy/gbrain/README.md. Keep bearer_token_env out of checked-in values:
# [[mcp_servers]]
# name = "gbrain"
# transport = "http"
# url = "http://127.0.0.1:9020/mcp"
# bearer_token_env = "GBRAIN_TOKEN"

[daemon]
# Canonical socket dir is fabric::paths::SOCKET_DIR = /run/aletheon.
# Linux /var/run compatibility is supplied by the OS symlink.
socket_path = "/run/aletheon/aletheon.sock"
log_level = "info"


# User-mode paths retain backwards-compatible `~` expansion. Production must
# override with config/production.toml.example; secret values are never inline.
[deployment]
mode = "user"

[deployment.paths]
state_root = "~/.aletheon"
config_root = "~/.aletheon"
runtime_root = "/run/aletheon"
cache_root = "~/.cache/aletheon"
state = "~/.aletheon/state"
goals = "~/.aletheon/goals"
sessions = "~/.aletheon/sessions"
mnemosyne = "~/.aletheon/memory"
artifacts = "~/.aletheon/artifacts"
worktrees = "~/.aletheon/worktrees"
audit = "~/.aletheon/audit"
secret_root = "~/.config/aletheon"

[deployment.quotas]
total_data_bytes = 107374182400
total_data_soft_bytes = 91268055040
total_data_items = 2000000
minimum_free_bytes = 5368709120
artifacts_bytes = 21474836480
artifacts_soft_bytes = 17179869184
artifacts_items = 100000
worktrees_bytes = 42949672960
worktrees_soft_bytes = 34359738368
worktrees_items = 10000
audit_bytes = 5368709120
audit_soft_bytes = 4294967296
audit_items = 400000
sessions_bytes = 10737418240
sessions_soft_bytes = 8589934592
sessions_items = 500000
google_bytes = 5368709120
google_soft_bytes = 4294967296
google_items = 500000
gbrain_spool_bytes = 268435456
gbrain_spool_soft_bytes = 201326592
gbrain_spool_items = 10000

[deployment.integrations]
telegram = false
google = false
gbrain = false

[deployment.secrets]
# provider = "/etc/aletheon/credentials/provider.env"
# telegram = "/etc/aletheon/credentials/telegram.env"
# google_vault_key = "/etc/aletheon/credentials/google-vault.key"
# gbrain = "/etc/aletheon/credentials/gbrain.env"
# backup_password = "/etc/aletheon/credentials/restic-password"

[deployment.backup]
mode = "disabled"
# repository_file = "/etc/aletheon/credentials/restic-repository"

[deployment.health]
minimum_free_bytes = 5368709120
maximum_backup_age_secs = 129600
maximum_sync_lag_secs = 3600
