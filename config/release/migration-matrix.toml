rollback = "restore_matching_data_and_binary"
fixture = "crates/mnemosyne/tests/gbrain_spool.rs"
reopen_test = "legacy_migration_redacts_commits_then_renames_and_restarts_idempotently"
integrity_query = "PRAGMA integrity_check"

