format_version = 1
release_policy = "forward_only"
mixed_version_operation = "forbidden"
binary_only_rollback_after_data_change = "forbidden"

# `kind = "contract"` records a versioned durable contract that currently has
# no cross-version data rewrite. `kind = "migration"` requires executable
# pre-migration, reopen, and integrity evidence.
[[transition]]
component = "event_spine"
from = "1"
to = "1"
kind = "contract"
data_change = false
backup_required = true
forward = "reopen_current"
rollback = "matching_data_and_binary"
evidence = "crates/executive/tests/event_spine_repository.rs"
integrity_query = "PRAGMA integrity_check"

