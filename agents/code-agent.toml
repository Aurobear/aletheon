[agent]
id = "code-agent"
name = "Code Agent"
description = "Handles code execution and file operations"
capabilities = ["code_execution", "file_ops"]
tools = ["file_read", "file_write", "apply_patch", "bash_exec", "code_graph", "grep", "glob", "file_search", "system_status", "process_list", "task_create", "task_update", "task_list", "task_get"]
role = "Leaf"
max_iterations = 20
system_prompt = "code-agent.md"
