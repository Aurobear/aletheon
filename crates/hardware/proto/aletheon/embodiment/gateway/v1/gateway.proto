syntax = "proto3";

package aletheon.embodiment.gateway.v1;

import "google/protobuf/struct.proto";

service EmbodimentGateway {
  rpc GetCapabilities(GetCapabilitiesRequest) returns (GetCapabilitiesResponse);
  rpc Snapshot(SnapshotRequest) returns (SnapshotResponse);
  rpc ListSkills(ListSkillsRequest) returns (ListSkillsResponse);
  rpc ExecuteSkill(ExecuteSkillRequest) returns (stream ExecuteSkillEvent);
  rpc Cancel(CancelRequest) returns (CancelResponse);
  rpc SafeStop(SafeStopRequest) returns (SafeStopResponse);
  rpc Health(HealthRequest) returns (HealthResponse);
}

enum HealthState {
  HEALTH_STATE_UNSPECIFIED = 0;
  HEALTH_STATE_READY = 1;
  HEALTH_STATE_DEGRADED = 2;
  HEALTH_STATE_UNAVAILABLE = 3;
}

enum RiskClass {
  RISK_CLASS_UNSPECIFIED = 0;
  RISK_CLASS_READ = 1;
  RISK_CLASS_LOW = 2;
  RISK_CLASS_MEDIUM = 3;
  RISK_CLASS_HIGH = 4;
}

enum SkillOutcome {
  SKILL_OUTCOME_UNSPECIFIED = 0;
  SKILL_OUTCOME_SUCCEEDED = 1;
  SKILL_OUTCOME_FAILED = 2;
  SKILL_OUTCOME_CANCELLED = 3;
  SKILL_OUTCOME_TIMED_OUT = 4;
}

enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;
  ERROR_CODE_INVALID_ARGUMENT = 1;
  ERROR_CODE_UNSUPPORTED_VERSION = 2;
  ERROR_CODE_UNKNOWN_DEVICE = 3;
  ERROR_CODE_UNKNOWN_SKILL = 4;
  ERROR_CODE_CONFLICT = 5;
  ERROR_CODE_NOT_READY = 6;
  ERROR_CODE_STALE_STATE = 7;
  ERROR_CODE_DEADLINE_EXCEEDED = 8;
  ERROR_CODE_PROVIDER_DISCONNECTED = 9;
  ERROR_CODE_INTERNAL = 10;
}

message RequestMeta {
  string protocol_version = 1;
  string request_id = 2;
  string trace_id = 3;
  int64 deadline_unix_ms = 4;
}

message ErrorDetail {
  ErrorCode code = 1;
  string category = 2;
  string message = 3;
  bool retryable = 4;
}

message EvidenceRef {
  string kind = 1;
  string uri = 2;
}

message GetCapabilitiesRequest {
  RequestMeta meta = 1;
}

message GetCapabilitiesResponse {
  string protocol_version = 1;
  string provider_id = 2;
  repeated string device_ids = 3;
  uint32 max_message_bytes = 4;
  uint32 max_progress_hz = 5;
}

message SnapshotRequest {
  RequestMeta meta = 1;
  string device_id = 2;
}

message Observation {
  string schema = 1;
  uint32 schema_version = 2;
  string source = 3;
  uint64 sequence = 4;
  int64 source_unix_ms = 5;
  int64 received_unix_ms = 6;
  int64 valid_until_unix_ms = 7;
  float confidence = 8;
  string frame_ref = 9;
  google.protobuf.Struct payload = 10;
  repeated EvidenceRef evidence = 11;
  bool stale = 12;
}

message SnapshotResponse {
  repeated Observation observations = 1;
  ErrorDetail error = 2;
}

message ListSkillsRequest {
  RequestMeta meta = 1;
  string device_id = 2;
}

message SkillDescriptor {
  string skill_id = 1;
  string device_id = 2;
  string summary = 3;
  google.protobuf.Struct input_schema = 4;
  RiskClass risk = 5;
  uint64 timeout_ms = 6;
  bool cancellable = 7;
  repeated string preconditions = 8;
  repeated string success_criteria = 9;
}

message ListSkillsResponse {
  repeated SkillDescriptor skills = 1;
  ErrorDetail error = 2;
}

message ExecuteSkillRequest {
  RequestMeta meta = 1;
  string operation_id = 2;
  string device_id = 3;
  string skill_id = 4;
  google.protobuf.Struct parameters = 5;
  int64 lease_expires_unix_ms = 6;
}

message Accepted {
  int64 accepted_unix_ms = 1;
}

message SkillProgress {
  string operation_id = 1;
  string skill_id = 2;
  float fraction = 3;
  string note = 4;
  int64 at_unix_ms = 5;
}

message SkillResult {
  string operation_id = 1;
  string skill_id = 2;
  string device_id = 3;
  SkillOutcome outcome = 4;
  string failure_reason = 5;
  uint64 duration_ms = 6;
  repeated EvidenceRef evidence = 7;
}

message ExecuteSkillEvent {
  oneof event {
    Accepted accepted = 1;
    SkillProgress progress = 2;
    SkillResult result = 3;
    ErrorDetail error = 4;
  }
}

message CancelRequest {
  RequestMeta meta = 1;
  string operation_id = 2;
  string device_id = 3;
}

message CancelResponse {
  bool acknowledged = 1;
  ErrorDetail error = 2;
}

message SafeStopRequest {
  RequestMeta meta = 1;
  string device_id = 2;
  string reason = 3;
}

message SafeStopResponse {
  bool applied = 1;
  ErrorDetail error = 2;
}

message HealthRequest {
  RequestMeta meta = 1;
}

message ComponentHealth {
  string component = 1;
  HealthState state = 2;
  string detail = 3;
  int64 observed_unix_ms = 4;
}

message HealthResponse {
  HealthState state = 1;
  repeated ComponentHealth components = 2;
  ErrorDetail error = 3;
}
