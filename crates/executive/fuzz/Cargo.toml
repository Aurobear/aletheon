[package]
name = "executive-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[dependencies]
arbitrary = { version = "1", features = ["derive"] }
executive = { path = ".." }
fabric = { path = "../../fabric" }
libfuzzer-sys = "0.4"
serde_json = "1"
toml = "0.8"

[[bin]]
name = "envelope_v2_parse"
path = "fuzz_targets/envelope_v2_parse.rs"
test = false
doc = false
bench = false

[[bin]]
name = "envelope_v2_roundtrip"
path = "fuzz_targets/envelope_v2_roundtrip.rs"
test = false
doc = false
bench = false

[[bin]]
name = "jsonrpc_message_parse"
path = "fuzz_targets/jsonrpc_message_parse.rs"
test = false
doc = false
bench = false

[[bin]]
name = "jsonrpc_method_dispatch"
path = "fuzz_targets/jsonrpc_method_dispatch.rs"
test = false
doc = false
bench = false

[[bin]]
name = "toml_config_parse"
path = "fuzz_targets/toml_config_parse.rs"
test = false
doc = false
bench = false

[[bin]]
name = "tool_input_json"
path = "fuzz_targets/tool_input_json.rs"
test = false
doc = false
bench = false

[[bin]]
name = "message_roundtrip"
path = "fuzz_targets/message_roundtrip.rs"
test = false
doc = false
bench = false

[workspace]
members = ["."]
