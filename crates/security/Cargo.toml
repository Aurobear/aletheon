[package]
name = "security"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Security pipeline and sandbox execution"

[dependencies]
base = { path = "../base" }
anyhow = "1"
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
nix = { version = "0.29", features = ["user", "ioctl"], optional = true }
uuid = { version = "1", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
dirs = "5"
glob = "0.3"
toml = "0.8"
which = "7"
parking_lot = "0.12"
dashmap = { workspace = true }

[features]
default = []
sandbox-primitives = ["nix"]

[dev-dependencies]
tempfile = "3"
tokio-test = "0.4"
